<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef1 100%);
            min-height: 100vh;
        }

        .welcome-container {
            text-align: center;
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(255, 107, 139, 0.15);
            border: 1px solid rgba(255, 182, 193, 0.3);
        }

        .welcome-title {
            color: #ff6b8b;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .welcome-subtitle {
            color: #8a6573;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .message-container {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .user-message {
            align-self: flex-end;
            max-width: 70%;
            margin: 10px 0;
        }

        .assistant-message {
            align-self: flex-start;
            max-width: 70%;
            margin: 10px 0;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.5s ease;
        }

        .user-bubble {
            background: linear-gradient(135deg, #8a6573 0%, #6d4c58 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .assistant-bubble {
            background: linear-gradient(135deg, #ffd6e0 0%, #ffb7c5 100%);
            color: #5a3a44;
            border-bottom-left-radius: 5px;
            border-left: 3px solid #ff6b8b;
        }

        .sender-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .user-name {
            text-align: right;
            color: #8a6573;
        }

        .assistant-name {
            text-align: left;
            color: #ff6b8b;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.6;
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator {
            display: inline-block;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ff6b8b;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes typing {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #ff6b8b;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* TTS状态样式 */
        .tts-status {
            font-size: 11px;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .tts-pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .tts-completed {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .tts-failed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .tts-skipped {
            background: #e8e8e8;
            color: #666;
            border: 1px solid #ddd;
        }

        /* 播放按钮样式 */
        .play-button {
            margin-left: 10px;
            padding: 2px 10px;
            background: linear-gradient(135deg, #ff9aac 0%, #ff7b95 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: linear-gradient(135deg, #ff8a9e 0%, #ff6b8b 100%);
            transform: scale(1.05);
        }

        .play-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .play-button-playing {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .play-button-completed {
            background: linear-gradient(135deg, #9E9E9E 0%, #757575 100%);
        }
    </style>
</head>

<body>
    <div class="welcome-container">
        <div class="welcome-title">🌸 八重樱·圣痕之庭 🌸</div>
        <div class="welcome-subtitle">
            此处为圣痕空间，时间在此停滞，唯有樱花永恒飘落。<br>
            我名八重樱，五百年前的巫女，如今的圣痕守护者。<br>
            <em>"樱花……每年依旧会开，只是赏花之人，终究是少了。"</em>
        </div>
    </div>
    <div id="messages-container"></div>
    <div id="typing-indicator" style="display: none;">
        <div class="assistant-message">
            <div class="assistant-name">八重樱</div>
            <div class="typing-indicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
